name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PRISMA_HIDE_UPDATE_MESSAGE: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Security scanning: dependency vulnerability audit + CodeQL static analysis.
  # Runs in parallel with the test/build jobs so it does not slow them down.
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability audit
        # Fail only on high/critical advisories; report the rest.
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.15
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.15
        with:
          category: '/language:javascript-typescript'

  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 24.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false

    - name: Setup pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Generate Prisma Client
      run: cd backend && pnpm prisma:generate

    - name: Run linting
      run: pnpm run lint
      
    - name: Run tests
      run: pnpm run test:ci
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
      continue-on-error: true
      with:
        directory: ./coverage
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: coverage-report-${{ matrix.node-version }}
        path: coverage/
        retention-days: 30
        
  integration-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false

    - name: Setup pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '24.x'
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Generate Prisma Client
      run: cd backend && pnpm prisma:generate

    - name: Run database migrations
      run: cd backend && pnpm prisma:migrate
      env:
        DATABASE_URL: file:./prisma/test.db

    - name: Start backend server
      run: |
        cd backend
        nohup pnpm start > /tmp/backend.log 2>&1 &
        echo $! > /tmp/backend.pid
        # Wait until health endpoint responds (up to 30 s)
        for i in $(seq 1 30); do
          if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
            echo "Backend ready after ${i}s"
            exit 0
          fi
          sleep 1
        done
        echo "Backend did not start in time. Logs:" && cat /tmp/backend.log
        exit 1
      env:
        NODE_ENV: test
        PORT: 3000
        DATABASE_URL: file:./prisma/test.db
        ACCESS_TOKEN_SECRET: ci-test-access-secret
        REFRESH_TOKEN_SECRET: ci-test-refresh-secret
        REDIS_URL: ""

    - name: Run integration tests
      run: pnpm run test:integration
      env:
        NODE_ENV: test
        STELLAR_USE_MOCK: "true"
        API_URL: http://localhost:3000

    - name: Stop backend server
      if: always()
      run: |
        if [ -f /tmp/backend.pid ]; then
          kill $(cat /tmp/backend.pid) || true
        fi

    - name: Upload backend logs on failure
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: backend-logs
        path: /tmp/backend.log
        retention-days: 7

    - name: Upload integration test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      if: always()
      with:
        name: integration-test-results
        path: |
          backend/coverage/
          **/test-results.xml
        retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: [test, integration-test]

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false

    - name: Setup pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '24.x'
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Generate Prisma Client
      run: cd backend && pnpm prisma:generate

    - name: Build packages
      run: pnpm run build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: build-artifacts
        path: |
          packages/core/dist/
          backend/dist/
          frontend/build/
        retention-days: 7
